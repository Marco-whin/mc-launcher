name: Build & Release MC Launcher

on:
  push:
    tags:
      - "v*"           # Trigger nur bei Tags wie v1.0.0, v1.2.3
  workflow_dispatch:   # Manuell auslösen über GitHub UI möglich

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: "MC Launcher Setup*.exe"
            name: Windows
          - os: macos-latest
            artifact: "MC Launcher*.dmg"
            name: macOS
          - os: ubuntu-latest
            artifact: "MC Launcher*.AppImage"
            name: Linux

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      # ── 1. Code auschecken ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js einrichten ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Linux: benötigte Systempakete ────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2 \
            libgbm-dev \
            rpm \
            fakeroot

      # ── 4. npm install ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Bauen ────────────────────────────────────────────────────────────
      - name: Build Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS Signierung (optional – ohne das läuft es, aber macOS warnt)
          # CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: npm run build -- --publish never

      # ── 6. Gebaute Dateien anzeigen (Debug) ─────────────────────────────────
      - name: List dist output
        shell: bash
        run: ls -lh dist/ || true

      # ── 7. Artefakt hochladen ────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-launcher-${{ matrix.name }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: warn

  # ── Release erstellen ────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # Nur bei echtem Tag-Push veröffentlichen
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Alle Artefakte der Build-Jobs herunterladen
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: find release-files -type f | sort

      # GitHub Release erstellen und Dateien anhängen
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MC Launcher ${{ github.ref_name }}"
          body: |
            ## MC Launcher ${{ github.ref_name }}

            ### Installation

            | Plattform | Datei | Hinweis |
            |-----------|-------|---------|
            | Windows   | `MC Launcher Setup*.exe` | Installer mit Deinstaller |
            | macOS     | `MC Launcher*.dmg`        | Drag & Drop in Applications |
            | Linux     | `MC Launcher*.AppImage`   | `chmod +x` dann starten |

            ### Automatische Updates
            Der Launcher prüft beim Start automatisch auf neue Versionen
            und bietet an, diese zu installieren.

            ### Änderungen
            <!-- Hier kannst du Changelogs eintragen -->
            - Initiales Release
          files: release-files/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
